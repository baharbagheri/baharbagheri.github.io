<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bahar Bagheri | Robotic Atlas</title>

  <style>
    :root {
      --black: #04070b;
      --black-2: #071018;
      --white: #ffffff;
      --muted: #677285;
      --muted-2: #3f4958;
      --cyan: #8eeaff;
      --orange: #ffb15c;
      --line: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 70% 20%, rgba(142, 234, 255, 0.08), transparent 28%),
        radial-gradient(circle at 30% 90%, rgba(255, 138, 61, 0.08), transparent 26%),
        #050608;
      color: var(--white);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding-top: 76px;
    }

    .site-header {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 50;
      background: rgba(4, 7, 11, 0.9);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }

    .header-inner {
      max-width: 1792px;
      margin: 0 auto;
      padding: 13px 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 34px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      color: inherit;
      text-decoration: none;
    }

    .brand-mark {
      position: relative;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(142, 234, 255, 0.38);
      background: #071018;
      color: #dffbff;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      right: -1px;
      bottom: -1px;
      width: 5px;
      height: 5px;
      background: var(--orange);
      box-shadow: 0 0 14px rgba(255, 177, 92, 0.65);
    }

    .brand-divider {
      width: 1px;
      height: 40px;
      background: var(--line);
    }

    .brand-title {
      display: block;
      color: var(--white);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 10px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.34em;
    }

    .nav {
      display: flex;
      align-items: center;
    }

    .nav a {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 34px;
      padding: 0 19px;
      color: var(--muted);
      text-decoration: none;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      transition: color 180ms ease;
    }

    .nav a:not(:last-child) {
      border-right: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav-number {
      color: var(--muted-2);
      transition: color 180ms ease;
    }

    .nav a:hover {
      color: #e9fbff;
    }

    .nav a:hover .nav-number {
      color: var(--orange);
    }

    .mobile-toggle {
      display: none;
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: var(--white);
      cursor: pointer;
    }

    .mobile-toggle span {
      display: block;
      width: 18px;
      height: 1px;
      margin: 5px auto;
      background: var(--white);
    }

    .mobile-menu {
      display: none;
      border-top: 1px solid var(--line);
      background: rgba(4, 7, 11, 0.96);
      padding: 12px 20px 18px;
    }

    .mobile-menu a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 4px;
      color: #b8c0cf;
      text-decoration: none;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .technical-strip {
      height: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      background:
        repeating-linear-gradient(
          75deg,
          rgba(255, 138, 61, 0.08) 0,
          rgba(255, 138, 61, 0.08) 1px,
          transparent 1px,
          transparent 32px
        );
    }

    .technical-strip::before {
      content: "";
      display: block;
      width: 100%;
      height: 1px;
      background: linear-gradient(
        90deg,
        rgba(255, 138, 61, 0.16),
        rgba(142, 234, 255, 0.18),
        rgba(255, 138, 61, 0.12)
      );
    }

    .demo-section {
      min-height: calc(100vh - 76px);
      display: grid;
      place-items: center;
      padding: 48px 24px;
      background:
        linear-gradient(rgba(142, 234, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(142, 234, 255, 0.035) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .demo-section h1 {
      max-width: 900px;
      text-align: center;
      font-size: clamp(42px, 7vw, 96px);
      line-height: 0.95;
      letter-spacing: -0.07em;
    }

    @media (max-width: 1100px) {
      .header-inner {
        padding-inline: 24px;
      }

      .nav a {
        padding-inline: 12px;
        letter-spacing: 0.2em;
      }
    }

    @media (max-width: 900px) {
      body {
        padding-top: 73px;
      }

      .header-inner {
        padding: 12px 20px;
      }

      .brand-divider,
      .nav {
        display: none;
      }

      .mobile-toggle {
        display: block;
      }

      .mobile-menu.is-open {
        display: block;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand-wrap">
        <a href="#home" class="brand">
          <span class="brand-mark">B</span>

          <span>
            <span class="brand-title">Bahar Bagheri</span>
            <span class="brand-subtitle">Robotic Atlas / V2</span>
          </span>
        </a>

        <span class="brand-divider"></span>
      </div>

      <nav class="nav" aria-label="Primary navigation">
        <a href="#home"><span class="nav-number">01</span><span>Home</span></a>
        <a href="#about"><span class="nav-number">02</span><span>About</span></a>
        <a href="#research"><span class="nav-number">03</span><span>Research</span></a>
        <a href="#portfolio"><span class="nav-number">04</span><span>Portfolio</span></a>
        <a href="#experiments"><span class="nav-number">05</span><span>Experiments</span></a>
        <a href="#cv"><span class="nav-number">06</span><span>CV</span></a>
        <a href="#contact"><span class="nav-number">07</span><span>Contact</span></a>
      </nav>

      <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <div class="mobile-menu" id="mobileMenu">
      <a href="#home"><span>01</span><span>Home</span></a>
      <a href="#about"><span>02</span><span>About</span></a>
      <a href="#research"><span>03</span><span>Research</span></a>
      <a href="#portfolio"><span>04</span><span>Portfolio</span></a>
      <a href="#experiments"><span>05</span><span>Experiments</span></a>
      <a href="#cv"><span>06</span><span>CV</span></a>
      <a href="#contact"><span>07</span><span>Contact</span></a>
    </div>

    <div class="technical-strip"></div>
  </header>

  <main id="home" class="demo-section">
    <h1>Computational design, robotic fabrication, and intelligent construction systems.</h1>
  </main>

  <script>
    const mobileToggle = document.getElementById("mobileToggle");
    const mobileMenu = document.getElementById("mobileMenu");

    mobileToggle.addEventListener("click", () => {
      mobileMenu.classList.toggle("is-open");
    });

    mobileMenu.querySelectorAll("a").forEach((link) => {
      link.addEventListener("click", () => {
        mobileMenu.classList.remove("is-open");
      });
    });
  </script>
</body>
</html>
